name: Feature request
description: Suggest a public memory-layer improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or developer need should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Public boundary
      options:
        - label: This request belongs in the public reference layer.
        - label: This request does not require credentials or private operating data.
