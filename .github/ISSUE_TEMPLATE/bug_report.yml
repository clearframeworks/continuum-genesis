name: Bug report
description: Report a reproducible Continuum Genesis issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For security vulnerabilities, do not publish exploit details here. Use the private reporting route in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, inputs, and the expected result.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Repository commit or release version.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, and browser if relevant.
